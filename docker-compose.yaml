version: "3.9"

services:

  postgres:
    image: postgres:17
    container_name: postgres-db

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: rate_limiter

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

    restart: unless-stopped

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rate_limiter"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4
    container_name: redis

    ports:
      - "6379:6379"

    volumes:
      - redis-data:/data

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rate-limiter-1:

    build: .

    container_name: rate-limiter-1

    ports:
      - "7071:7070"

    environment:

      SERVER_PORT: 7070

      DB_URL: jdbc:postgresql://postgres:5432/rate_limiter
      DB_USERNAME: postgres
      DB_PASSWORD: root

      REDIS_URL: redis://redis:6379

      LOGGING_LEVEL: INFO

    depends_on:

      postgres:
        condition: service_healthy

      redis:
        condition: service_healthy

    restart: unless-stopped


  rate-limiter-2:

    build: .

    container_name: rate-limiter-2

    ports:
      - "7072:7070"

    environment:

      SERVER_PORT: 7070

      DB_URL: jdbc:postgresql://postgres:5432/rate_limiter
      DB_USERNAME: postgres
      DB_PASSWORD: root

      REDIS_URL: redis://redis:6379

      LOGGING_LEVEL: INFO

    depends_on:

      postgres:
        condition: service_healthy

      redis:
        condition: service_healthy

    restart: unless-stopped

  nginx:

    image: nginx:latest
    container_name: nginx

    ports:
      - "8080:80"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf

    depends_on:
      - rate-limiter-1
      - rate-limiter-2

    restart: unless-stopped

volumes:

  postgres-data:
  redis-data: