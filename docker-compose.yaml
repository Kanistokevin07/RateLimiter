version: "3.9"

services:

  postgres:
    image: postgres:17
    container_name: postgres-db

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: rate_limiter

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

    restart: unless-stopped

  redis:
    image: redis:7.4

    container_name: redis

    ports:
      - "6379:6379"

    volumes:
      - redis-data:/data

    restart: unless-stopped

volumes:

  postgres-data:

  redis-data: